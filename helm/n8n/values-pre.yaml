# ============================================
# VALUES PARA ENTORNO DE PREPRODUCCIÓN (pre)
# ============================================

environment: pre

namespace:
  create: true
  name: n8n-pre

replicaCount: 1

image:
  tag: "1.50.0"

ingress:
  enabled: true
  className: traefik
  host: n8n-pre.qforexwin.com
  annotations:
    external-dns.alpha.kubernetes.io/hostname: n8n-pre.qforexwin.com
  certManager:
    issuer: letsencrypt-prod  # Usar el ClusterIssuer de producción

persistence:
  enabled: true
  size: 10Gi
  storageClass: local-path

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

n8n:
  basicAuth:
    enabled: true
    username: admin
    password: pre-password-change-me
  encryptionKey: pre-encryption-key-change-me-32chars!!

postgresql:
  enabled: true
  auth:
    username: n8n_pre
    password: pre-db-password-change-me
    database: n8n_pre
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: local-path
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
