# ============================================
# VALUES PARA ENTORNO DE PREPRODUCCIÓN (pre)
# ============================================

environment: pre

namespace:
  create: true
  name: n8n-pre

replicaCount: 1

image:
  tag: "1.50.0"

ingress:
  enabled: true
  className: traefik
  host: n8n-pre.qforexwin.com
  annotations:
    external-dns.alpha.kubernetes.io/hostname: n8n-pre.qforexwin.com
  certManager:
    issuer: letsencrypt-prod  # Usar el ClusterIssuer de producción

persistence:
  enabled: true
  size: 10Gi
  storageClass: local-path

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# ============================================
# VALUES PARA ENTORNO DE PREPRODUCCIÓN (pre)
# Las credenciales se leen de Secrets de Kubernetes
# ============================================

n8n:
  basicAuth:
    enabled: true
  # Los Secrets se crean con: source ~/.env && ./scripts/create-secrets.sh pre
  existingAuthSecret: "n8n-pre-auth"

postgresql:
  enabled: true
  auth:
    # Secret creado previamente
    existingSecret: "pre-postgresql"
    # Valores para referencia (no se usan si existingSecret está definido)
    username: n8n_pre
    database: n8n_pre
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: local-path
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
