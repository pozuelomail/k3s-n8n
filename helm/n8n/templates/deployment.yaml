apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n.fullname" . }}
  namespace: {{ .Values.namespace.name | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: n8n
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "{{ .Values.n8n.basicAuth.enabled }}"
            - name: N8N_BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n.authSecretName" . }}
                  key: username
            - name: N8N_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n.authSecretName" . }}
                  key: password
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n.authSecretName" . }}
                  key: encryptionKey
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: {{ .Values.postgresql.auth.host | default (printf "%s-postgresql" (include "n8n.fullname" .)) }}
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: {{ .Values.postgresql.auth.database }}
            - name: DB_POSTGRESDB_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret | default (printf "%s-postgresql" (include "n8n.fullname" .)) }}
                  key: password
            - name: N8N_PORT
              value: "5678"
            - name: WEBHOOK_URL
              value: "https://{{ .Values.ingress.host }}/"
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_SECURE_COOKIE
              value: "true"
            - name: N8N_HIRING_BANNER_ENABLED
              value: "false"
            - name: EXECUTIONS_MODE
              value: {{ .Values.n8n.executions.mode | default "regular" }}
            - name: EXECUTIONS_TIMEOUT
              value: "{{ .Values.n8n.executions.timeout | default 3600 }}"
            - name: EXECUTIONS_TIMEOUT_MAX
              value: "{{ .Values.n8n.executions.timeoutMax | default 7200 }}"
          {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "n8n.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
