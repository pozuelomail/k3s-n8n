# ============================================
# VALUES PARA ENTORNO DE DESARROLLO (dev)
# ============================================

environment: dev

namespace:
  create: true
  name: n8n-dev

replicaCount: 1

image:
  tag: "latest"

ingress:
  enabled: true
  className: traefik
  host: n8n-dev.qforexwin.com
  annotations:
    external-dns.alpha.kubernetes.io/hostname: n8n-dev.qforexwin.com
  certManager:
    issuer: letsencrypt-prod  # Usar el ClusterIssuer de producción

persistence:
  enabled: true
  size: 5Gi
  storageClass: local-path

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# ============================================
# VALUES PARA ENTORNO DE DESARROLLO (dev)
# Las credenciales se leen de Secrets de Kubernetes
# ============================================

n8n:
  basicAuth:
    enabled: true
  # Los Secrets se crean con: source ~/.env && ./scripts/create-secrets.sh dev
  existingAuthSecret: "n8n-dev-auth"

postgresql:
  enabled: true
  auth:
    # Secret creado previamente
    existingSecret: "dev-postgresql"
    # Valores para referencia (no se usan si existingSecret está definido)
    username: n8n_dev
    database: n8n_dev
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: local-path
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
