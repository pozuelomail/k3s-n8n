# Valores base del chart n8n
# Sobreescribir con values-dev.yaml, values-pre.yaml, values-pro.yaml según el entorno

environment: dev

nameOverride: ""
fullnameOverride: ""

namespace:
  create: false
  name: n8n

replicaCount: 1

image:
  repository: n8nio/n8n
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 5678

ingress:
  enabled: true
  className: traefik
  host: n8n.qforexwin.com
  annotations:
    # external-dns ya está instalado - se auto-configurará
    external-dns.alpha.kubernetes.io/hostname: n8n.qforexwin.com
  certManager:
    issuer: letsencrypt-prod  # Todos los entornos usan letsencrypt-prod

persistence:
  enabled: true
  size: 10Gi
  accessMode: ReadWriteOnce
  storageClass: local-path

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# ============================================
# Configuración de n8n
# Las credenciales se leen de Secrets de Kubernetes
# creados previamente desde ~/.env
# ============================================
n8n:
  basicAuth:
    enabled: true
  executions:
    mode: regular
    timeout: 3600
    timeoutMax: 7200

env: {}

# ============================================
# Configuración de PostgreSQL subchart
# El Secret debe existir previamente (creado con create-secrets.sh)
# ============================================
postgresql:
  enabled: true
  auth:
    host: ""
    # Estos valores se ignoran si existingSecret está definido
    username: n8n
    password: ""
    database: n8n
    # Secret creado previamente por create-secrets.sh
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: local-path
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
