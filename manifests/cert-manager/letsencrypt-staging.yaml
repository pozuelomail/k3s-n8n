# ============================================
# ClusterIssuer de Let's Encrypt - Staging
# Usar para dev y pruebas (tiene límites menos restrictivos)
# ============================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Servidor de staging (sin límites de rate)
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@qforexwin.com  # Cambiar por email real
    privateKeySecretRef:
      name: letsencrypt-staging-private-key
    solvers:
      - http01:
          ingress:
            class: traefik
      - dns01:
          # Configurar si se usa DNS challenge
          # Ejemplo con Cloudflare:
          # cloudflare:
          #   email: admin@qforexwin.com
          #   apiTokenSecretRef:
          #     name: cloudflare-api-token
          #     key: api-token
          selector: {}
