# ============================================
# ClusterIssuer de Let's Encrypt - Producción
# Usar para pre y pro (tiene límites de rate más estrictos)
# ============================================
# NOTA: Solo aplicar después de verificar en staging
# Rate limits: 50 certificados por dominio por semana
# ============================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Servidor de producción
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@qforexwin.com  # Cambiar por email real
    privateKeySecretRef:
      name: letsencrypt-prod-private-key
    solvers:
      - http01:
          ingress:
            class: traefik
      - dns01:
          # Configurar si se usa DNS challenge (recomendado para wildcard)
          # Ejemplo con Cloudflare:
          # cloudflare:
          #   email: admin@qforexwin.com
          #   apiTokenSecretRef:
          #     name: cloudflare-api-token
          #     key: api-token
          selector: {}
